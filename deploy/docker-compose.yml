name: api-mangabal

services:
  manga-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: manga-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - manga-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://manga.iqbalpradipta.my.id/api/v1}
        NEXT_PUBLIC_ADMIN_TOKEN: ${ADMIN_TOKEN}
    container_name: manga-dashboard
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - manga-network
    depends_on:
      - manga-api

networks:
  manga-network:
    driver: bridge
